# Gas Town Starter Kit — single-service compose.
#
# Why single-service:
#   - Starter kit audience is "friends new to AI tooling". One process to reason
#     about is simpler than a multi-service topology.
#   - Dolt is fragile; coupling its lifecycle to the rest of the stack means a
#     restart is a single `docker compose restart`, not a multi-step recovery.
#
# State partitioning (what survives image rebuilds):
#   - gastown-dolt-data  → beads / mail / identity history (the data plane)
#   - gastown-repos      → user repos cloned by rigs
#   - gastown-claude     → ~/.claude inside the container (mirrors host login)
#   - gastown-logs       → rotated logs from Mayor / TeleTalk / Crow
#   - ./.env             → bind-mounted so host edits are picked up on restart
#
# The bind-mount of ~/.claude from the host is what lets `claude login` on the
# host flow through to the container without asking users to re-auth.

services:
  gastown:
    build:
      context: .
      dockerfile: Dockerfile
    image: gastown-starter:latest
    container_name: gastown
    hostname: gastown
    restart: unless-stopped
    init: true
    stop_grace_period: 30s

    env_file:
      - .env

    # daemon mode runs the full boot sequence (Dolt → HQ install → gt-bot →
    # Mayor). The Dockerfile's CMD defaults to this too; setting it here
    # makes the behavior explicit for anyone reading just the compose file.
    # Override with `docker compose run --rm gastown wizard` for interactive
    # onboarding, or `... shell` for a bare bash prompt.
    command: ["daemon"]

    # Dolt is reachable from the host for debugging / gt dolt status.
    # gt-bot's HTTP /send + /health API is also exposed so agents on the host
    # can post to http://localhost:3335/send.
    ports:
      - "3307:3307"
      - "3335:3335"

    volumes:
      # Claude credentials — passthrough from host. Read-write so the agent
      # inside the container can refresh tokens.
      - type: bind
        source: ${HOME}/.claude
        target: /home/gastown/.claude

      # Per-stack data that must survive rebuilds. Declared below.
      - gastown-dolt-data:/gastown/.dolt-data
      - gastown-repos:/gastown/repos
      - gastown-logs:/gastown/logs

      # Starter-kit `.env` lives on the host so users edit it there.
      - type: bind
        source: ./.env
        target: /gastown/.env

      # Host docker socket — lets Mayor drive `docker compose` against the
      # operator's host daemon (e.g. spin up a dev container for PR testing
      # without paste-and-run from the operator). This grants effective
      # root-on-host inside the container; see docs/docker-access.md for the
      # full trust analysis and how to disable.
      - type: bind
        source: /var/run/docker.sock
        target: /var/run/docker.sock

    # Keep the wizard interactive when users `docker compose run` or
    # `docker compose exec`. The default `up -d` path uses the `daemon` entry
    # (see entrypoint.sh) instead of the interactive wizard.
    stdin_open: true
    tty: true

    # Dolt's goroutine dumps live in the log; `gt dolt status` needs to see
    # the PID file, so we give the process a predictable working dir.
    working_dir: /gastown

  # Optional read-only status webpage for the rigs/agents/beads. Opt-in via
  # `docker compose --profile dashboard up -d`. Default `up -d` skips it.
  # See dashboard/Dockerfile and dashboard/server.js.
  rigs-dashboard:
    profiles: ["dashboard"]
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    image: gastown-rigs-dashboard:latest
    container_name: gastown-dashboard
    restart: unless-stopped
    depends_on:
      - gastown
    ports:
      # Localhost-only by default; operator can SSH-tunnel for remote access.
      - "127.0.0.1:3338:3338"
    environment:
      DASHBOARD_AUTH_TOKEN: ${DASHBOARD_AUTH_TOKEN:-}
      GT_TARGET_CONTAINER: gastown
    volumes:
      # Read-only docker socket so we can `docker exec gastown ...` for
      # gt/bd/tmux queries without reaching into the container's filesystem.
      - type: bind
        source: /var/run/docker.sock
        target: /var/run/docker.sock
        read_only: true
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3338/healthz', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  gastown-dolt-data:
  gastown-repos:
  gastown-logs:
